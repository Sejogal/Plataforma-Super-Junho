<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pódio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: white;
    }

    .hidden {
        display: none;
    }

    /* CONTAINER */
    .podio-container {
        max-width: 1000px;
        margin: auto;
        padding: 30px;
    }

    /* PODIO */
    .podio {
        display: flex;
        justify-content: center;
        align-items: flex-end;
        gap: 20px;
        margin-bottom: 40px;
    }

    /* ITEM BASE */
    .podio-item {
        width: 180px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        text-align: center;
        padding: 20px 15px;

        backdrop-filter: blur(10px);

        position: relative;
        transition: 0.3s;
    }

    .podio-item:hover {
        transform: translateY(-5px);
    }

    /* IMAGEM */
    .podio-item img {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        object-fit: cover;
        border: 3px solid gold;
        margin-bottom: 10px;
    }

    /* POSIÇÃO */
    .posicao {
        position: absolute;
        top: -15px;
        left: 50%;
        transform: translateX(-50%);

        width: 35px;
        height: 35px;

        background: gold;
        color: black;

        border-radius: 50%;
        font-weight: bold;

        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* ALTURAS DO PODIO */
    .primeiro {
        height: 260px;
        background: rgba(255, 215, 0, 0.15);
        border: 1px solid gold;
    }

    .segundo {
        height: 220px;
    }

    .terceiro {
        height: 200px;
    }

    /* LISTA RESTANTE */
    .lista-resto {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .item {
        display: flex;
        align-items: center;
        gap: 12px;

        background: rgba(255, 255, 255, 0.05);
        padding: 10px 15px;
        border-radius: 12px;
    }

    .item img {
        width: 45px;
        height: 45px;
        border-radius: 50%;
    }

    .item h4 {
        margin: 0;
        font-size: 14px;
    }

    .item span {
        font-size: 12px;
        color: #aaa;
    }
        .containerSuspense {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
</style>

<body>

    <div class="containerSuspense" id="containerSuspense">
        <h1 id="textoSuspense">Calculando resultados...</h1>
    </div>


    <div class="hidden" id="podioContainer">

        <!-- PODIO PRINCIPAL -->
        <div class="podio" id="podio">


        </div>

        <!-- RESTO DOS PARTICIPANTES -->
        <div class="lista-resto" id="restoPodio">


        </div>

    </div>

    <button class="btn btn-secondary" style="position: absolute; bottom: 20px; right: 20px;" onclick="window.location.href = '/'">Voltar para início</button>

</body>
<script src="/src/js/podioscripts.js"></script>

</script>

</html>
