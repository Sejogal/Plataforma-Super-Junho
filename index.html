<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma Super Junho</title>
    <link rel="stylesheet" href="/src/style/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>

<body>
    <div class="container">
        <h1>PLATAFORMA SUPER JUNHO</h1>

        <div class="containerBtn">
            <button class="btnAbrirModal" onclick="abrirModal()">Criar Time</button>
            <button class="btnDeleteTime" onclick="deletarTime()">Apagar Time</button>
            <button class="btnIniciar" onclick="acessarPainelAdm()">Gerir Times</button>
        </div>
        <div class="hidden" id="modal">
            <div class="modal-content">
                <span class="close" onclick="fecharModal()">&times;</span>
                <h2>Criar Time</h2>
                <!-- <form id="criarTimeForm"> -->
                <label for="nomeTime">Nome do Time:</label>
                <input type="text" id="nomeTime" name="nomeTime" required>
                <div style="display: flex; justify-content: center; align-items: center;" >
                    <input type="file" name="picture" id="picture" accept="image/*" required>
                    <span style="cursor: pointer;" onclick="limparInputFile()">&times;</span>
                </div>
                <button class="btnCriarTime" onclick="criarTime()">Criar</button>
                <!-- </form> -->
            </div>
        </div>
    </div>
    <br>

    <div id="containerTime">
        <h2 id="titleTime">Times Criados</h2>
        <div id="listaTimes">
            <!-- Os times criados serão adicionados aqui -->
        </div>
        <button class="btnIniciar" id="btnIniciar" onclick="iniciarJogo()">Iniciar</button>

    </div>

</body>
<script src="/src/js/script.js"></script>

</html>
