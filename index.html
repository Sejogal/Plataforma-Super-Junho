<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma Super Junho</title>
    <link rel="stylesheet" href="/src/style/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>

<body>
    <div class="container" id="container">
        <h1>PLATAFORMA SUPER JUNHO</h1>

        <div class="containerBtn">
            <button class="btnAbrirModal" onclick="abrirModal()">Criar Time</button>
            <button class="btnDeleteTime" onclick="deletarTime()">Apagar Time</button>
            <button class="btnAdm" onclick="acessarPainelAdm()">Gerir Times</button>
        </div>
        <div class="hidden" id="modal">
            <div class="modal-content">
                <span class="close" onclick="fecharModal()">&times;</span>
                <h2>Criar Time</h2>
                <!-- <form id="criarTimeForm"> -->
                <label for="nomeTime">Nome do Time:</label>
                <input type="text" id="nomeTime" name="nomeTime" required>
                <div style="display: flex; justify-content: center; align-items: center;">
                    <input type="file" name="picture" id="picture" accept="image/*" required>
                    <span style="cursor: pointer;" onclick="limparInputFile()">&times;</span>
                </div>
                <button class="btnCriarTime" onclick="criarTime()">Criar</button>
                <!-- </form> -->
            </div>
        </div>
    </div>
    <br>
    <div class="containerTime" id="containerTime1">
        <h2 id="titleTime">Times Criados</h2>
        <div id="listaTimes">

            <!-- Os times criados serão adicionados aqui -->
        </div>
        <button class="btnIniciar" id="btnIniciar" onclick="iniciarJogo()">Iniciar</button>

    </div>

    <!-- ------------ SEGUNDO CONTAINER EXIBIR TIME------------ -->
    <div class="hidden" id="containerQuiz">
        <h1>BEM VINDO EQUIPE(s)</h1>
        <div id="containerTime" class="containerTime">
            <h2>Times Criados</h2>
            <div id="listaTimes2">

                <!-- Os times criados serão adicionados aqui -->
            </div>
            <p id="contagem"></p>
        </div>
        <a href="/" class="btn btn-secondary">Voltar em casa</a>
        <button class="btn btn-primary" onclick="exibirEnigmas()">Avançar</button>
    </div>
    <!-- OS DESAFIOS APARECEM AQUI -->
    <div class="hidden" id="containerDesafios">

    </div>
    <button id="btnSobre" style="position:absolute; bottom: 10px; right: 10px;" class="btn btn-secondary">Sobre o
        Dev</button>
    <!-- Sobre o dev -->

        <a href="https://www.linkedin.com/in/seth-lussueki-5b36a7392/" target="_blank"><img class="icon-rede"
